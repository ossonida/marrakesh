  <title>Marrakesh Reference</title>

  <style>
    :root {
      --bg: #0b1224;
      --card: #0f172a;
      --accent: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk','Noto Sans KR','Malgun Gothic',sans-serif;
      background: radial-gradient(circle at 20% 20%, #132347 0, #0b1224 40%), #0b1224;
      color: var(--text);
      padding: 20px 20px;
    }
    .layout { max-width: 1200px; margin: 0 auto; display: grid; gap: 24px; }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: max-content;
      margin: 0 0 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      opacity: 0.88;
    }
    .home-link:hover { opacity: 1; color: var(--accent); }
    .home-link svg { width: 16px; height: 16px; flex: 0 0 auto; }
    .page-top {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 4px 0 12px;
      background: linear-gradient(180deg, rgba(11,18,36,0.96) 0%, rgba(11,18,36,0.78) 60%, rgba(11,18,36,0) 100%);
      backdrop-filter: blur(6px);
    }
    .page-top-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: nowrap; }
    .page-title { margin: 0 0 10px; font-size: 26px; font-weight: 600; letter-spacing: -0.3px; flex: 1 1 auto; min-width: 0; }
    .lang-switch { position: relative; z-index: 120; flex-shrink: 0; }
    .lang-switch button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-switch button .lang-label,
    .lang-menu button .lang-label { display: inline-flex; align-items: center; gap: 6px; }
    .lang-icon {
      display: block;
      width: 18px;
      height: 13px;
      object-fit: cover;
      border-radius: 2px;
      flex: 0 0 auto;
    }
    .lang-switch button .lang-caret { font-size: 12px; opacity: 0.85; }
    .lang-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
      z-index: 130;
      display: none;
      min-width: 56px;
      padding: 6px;
    }
    .lang-menu button {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-menu button:hover { background: rgba(255,255,255,0.06); }
    .lang-menu button.is-active { background: rgba(34, 211, 238, 0.12); }
    .lang-switch.open .lang-menu { display: block; }
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 12px; }
    .filter-tabs button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 120ms, transform 120ms;
    }
    .filter-tabs button:hover { border-color: var(--accent); transform: translateY(-1px); }
    .filter-tabs button.is-active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(34,211,238,0.3); }
    .search-bar { position: relative; margin-bottom: 8px; }
    .search-bar input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: 1px solid transparent;
      transition: outline 120ms ease, background 120ms ease;
      font-size: 16px;
    }
    .search-bar input:focus { outline: 1px solid var(--accent); background: rgba(34,211,238,0.05); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 20px 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .count-tag { font-size: 12px; color: var(--muted); font-weight: 600; }
    .section-note {
      margin-left: auto;
      max-width: 680px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-align: right;
    }
    .card h2 { margin: 0; font-size: 18px; letter-spacing: -0.2px; }
    table { width: 100%; border-collapse: collapse; }
    thead { color: var(--muted); font-size: 13px; }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    .col-image { width: 190px; }
    .col-number { width: 92px; white-space: nowrap; }
    .col-name { width: 210px; }
    .col-text { min-width: 360px; white-space: pre-line; line-height: 1.5; }
    .ref-img {
      width: 160px;
      max-height: 240px;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      display: block;
    }
    [data-section="river"] .ref-img { width: 220px; max-height: 120px; }
    [data-section="building"] .ref-img { width: 210px; max-height: 170px; }
    [data-section="provision"] .ref-img,
    [data-section="luxury"] .ref-img { width: 150px; max-height: 150px; }
    tbody tr.hide { display: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    .table-wrap { overflow-x: auto; }
    .empty { color: var(--muted); padding: 12px 4px; font-size: 14px; }
    .empty.hide { display: none; }
    .hide-section { display: none; }
    .btn-top {
      position: fixed;
      right: 14px;
      bottom: 16px;
      z-index: 80;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(34, 211, 238, 0.12);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      display: none;
      backdrop-filter: blur(6px);
    }
    .btn-top.show { display: inline-flex; align-items: center; gap: 6px; }
    @media (max-width: 900px) {
      .layout { gap: 18px; }
      body { padding: 5px 16px 30px; }
      .card { padding: 16px 14px; }
      .search-bar input { font-size: 15px; }
      .page-title { font-size: 22px; }
      .count-tag { font-size: 11px; }
      .section-note { width: 100%; margin-left: 0; text-align: left; }
    }
    @media (max-width: 720px) {
      .layout { gap: 12px; }
      .card { padding: 12px 10px; }
      .col-image { width: 120px; }
      .ref-img { width: 110px; max-height: 180px; }
      [data-section="river"] .ref-img { width: 150px; max-height: 90px; }
      [data-section="building"] .ref-img { width: 140px; max-height: 120px; }
      [data-section="provision"] .ref-img,
      [data-section="luxury"] .ref-img { width: 110px; max-height: 110px; }
      .col-name { min-width: 150px; }
      .col-text { min-width: 260px; }
    }
  </style>
</head>

        buildingCols: ['Imagen', 'Nombre', 'Texto'],
        sections: { scroll: 'Pergaminos', oasis: 'Oasis', river: 'Losetas de río', building: 'Edificios especiales', newOasis: 'Nuevos oasis', luxury: 'Nuevos bienes de lujo', provision: 'Nuevas losetas de provisión' },
        sectionNotes: { building: 'Antes de comenzar la partida, los jugadores acuerdan qué cara de los edificios especiales usar. Todos los jugadores deben usar la misma cara. (Los keshis/recursos con borde verde se reciben durante la preparación.)' },
        count: 'elementos'
      }
    };

    const langSwitch = document.getElementById('lang-switch');
    const langButton = document.getElementById('lang-button');
    const langMenu = document.querySelector('.lang-menu');
    const input = document.getElementById('global-search');
    const tabs = document.querySelectorAll('#section-tabs button');
    const sections = document.querySelectorAll('[data-section]');
    const globalEmpty = document.getElementById('global-empty');
    const btnTop = document.getElementById('btn-top');
    let activeSection = 'all';

    const syncLanguageSwitcher = (lang) => {
      const active = langMenu.querySelector(`[data-lang="${lang}"]`);
      const label = active?.querySelector('.lang-label')?.cloneNode(true);
      if (label) {
        const current = langButton.querySelector('.lang-label');
        current.replaceWith(label);
      }
      langMenu.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('is-active', btn.dataset.lang === lang);
      });
    };

    const rowsFor = (section) => window.referenceData?.[section] || [];
    const itemText = (section, item, lang) => {
      if (lang === 'ko') return { name: item.name, content: item.content };
      const localized = window.referenceLocaleData?.[lang]?.[section]?.[item.number]
        || window.referenceLocaleData?.en?.[section]?.[item.number];
      return {
        name: localized?.name || item.name,
        content: localized?.content || item.content
      };
    };

    const applyRowLanguage = (lang) => {
      sections.forEach(section => {
        const key = section.dataset.section;
        const isBuilding = key === 'building';
        section.querySelectorAll('tbody tr').forEach((row, i) => {
          const item = rowsFor(key)[i];
          if (!item) return;
          const localized = itemText(key, item, lang);
          const img = row.querySelector('img');
          if (img) img.alt = `${localized.name} ${item.number}`;
          row.cells[isBuilding ? 1 : 2].textContent = localized.name;
          row.cells[isBuilding ? 2 : 3].textContent = localized.content;
        });
      });
    };

    const renderTables = () => {
      sections.forEach(section => {
        const key = section.dataset.section;
        const isBuilding = key === 'building';
        const tbody = section.querySelector('tbody');
        tbody.textContent = '';
        rowsFor(key).forEach(item => {
          const row = document.createElement('tr');
          const imgCell = document.createElement('td');
          const nameCell = document.createElement('td');
          const textCell = document.createElement('td');
          const img = document.createElement('img');

          img.className = 'ref-img';
          img.src = item.image;
          img.alt = `${item.name} ${item.number}`;
          img.loading = 'lazy';
          imgCell.className = 'col-image';
          nameCell.className = 'col-name';
          textCell.className = 'col-text';
          nameCell.textContent = item.name;
          textCell.textContent = item.content;
          imgCell.appendChild(img);
          if (isBuilding) {
            row.append(imgCell, nameCell, textCell);
          } else {
            const numberCell = document.createElement('td');
            numberCell.className = 'col-number';
            numberCell.textContent = item.number;
            row.append(imgCell, numberCell, nameCell, textCell);
          }
          tbody.appendChild(row);
        });
      });
    };

    const applyLanguage = (lang) => {
      const activeLang = baseSectionLabels[lang] ? lang : 'en';
      const t = baseSectionLabels[activeLang];
      document.documentElement.lang = activeLang;
      document.documentElement.setAttribute('data-lang', activeLang);
      document.getElementById('page-title').textContent = t.pageTitle;
      tabs.forEach((btn, i) => { if (t.tabs[i]) btn.textContent = t.tabs[i]; });
      input.placeholder = t.search;
      document.querySelectorAll('.card .empty').forEach(el => el.textContent = t.empty);
      if (globalEmpty) globalEmpty.textContent = t.globalEmpty;
      sections.forEach(section => {
        const key = section.dataset.section;
        const h2 = section.querySelector('h2');
        const count = section.querySelector('.count-tag');
        const ths = section.querySelectorAll('thead th');
        const note = section.querySelector('[data-section-note]');
        const cols = key === 'building' ? (t.buildingCols || [t.cols[0], t.cols[2], t.cols[3]]) : t.cols;
        if (h2) h2.textContent = t.sections[key];
        if (count) count.textContent = `${rowsFor(key).length}${activeLang === 'ko' || activeLang === 'ja' ? '' : ' '}${t.count}`;
        if (note) note.textContent = t.sectionNotes?.[key] || '';
        ths.forEach((th, i) => { if (cols[i]) th.textContent = cols[i]; });
      });
      localStorage.setItem('marrakesh-lang', activeLang);
      syncLanguageSwitcher(activeLang);
      applyRowLanguage(activeLang);
      applyFilters();
    };

    const applyFilters = () => {
      const q = input.value.trim().toLowerCase();
      let visibleCount = 0;
      sections.forEach(section => {
        const sectionMatch = activeSection === 'all' || activeSection === section.dataset.section;
        let rowCount = 0;
        section.querySelectorAll('tbody tr').forEach(row => {
          const searchMatch = !q || row.textContent.toLowerCase().includes(q);
          const visible = sectionMatch && searchMatch;
          row.classList.toggle('hide', !visible);
          if (visible) rowCount += 1;
        });
        const showSection = sectionMatch && (!q || rowCount > 0);
        section.classList.toggle('hide-section', !showSection);
        section.querySelector('.empty')?.classList.toggle('hide', rowCount > 0 || !sectionMatch);
        if (showSection) visibleCount += 1;
      });
      globalEmpty?.classList.toggle('hide', visibleCount > 0);
    };

    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        activeSection = btn.dataset.show;
        tabs.forEach(tab => tab.classList.toggle('is-active', tab === btn));
        applyFilters();
      });
    });
    input.addEventListener('input', applyFilters);

    langButton.addEventListener('click', () => {
      const open = langSwitch.classList.toggle('open');
      langButton.setAttribute('aria-expanded', open);
    });
    langMenu.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        langSwitch.classList.remove('open');
        langButton.setAttribute('aria-expanded', 'false');
        applyLanguage(btn.dataset.lang);
      });
    });
    document.addEventListener('click', (e) => {
      if (!langSwitch.contains(e.target)) {
        langSwitch.classList.remove('open');
        langButton.setAttribute('aria-expanded', 'false');
      }
    });
    window.addEventListener('scroll', () => {
      btnTop.classList.toggle('show', window.scrollY > 320);
    });
    btnTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    renderTables();
    applyLanguage(localStorage.getItem('marrakesh-lang') || 'ko');
  </script>
  <footer style="text-align:center; margin:16px 0 12px; font-size:11px; color:#94a3b8;">
    <a href="mailto:ossonida@gmail.com" style="color: #e2e8f0; text-decoration: none;">ⓒfunnyda</a>
  </footer>
</body>
